<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>patchistant – Il tuo assistente per le patch</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap');
  :root {
    --bg: #0c0c13; --surface: #16161f; --surface2: #1e1e2e;
    --accent: #a78bfa; --accent2: #f472b6; --text: #e2e0f0;
    --muted: #6b6880; --border: #2a2a3a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; padding: 40px 16px; }
  .container { max-width: 720px; margin: 0 auto; }
  header { text-align: center; margin-bottom: 48px; position: relative; }
  header h1 { font-family: 'Syne', sans-serif; font-size: 2.8rem; font-weight: 800; background: linear-gradient(135deg, #a78bfa, #f472b6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  header p { color: var(--muted); margin-top: 10px; font-size: 1rem; }
  .lang-selector { position: absolute; top: 0; right: 0; display: flex; flex-wrap: wrap; gap: 4px; justify-content: flex-end; max-width: 220px; }
  .lang-btn { background: transparent; border: 1px solid var(--border); border-radius: 6px; color: var(--muted); font-size: 0.75rem; padding: 3px 7px; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.2s; }
  .lang-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(167,139,250,0.1); }
  .lang-btn:hover:not(.active) { border-color: var(--muted); color: var(--text); }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 28px; margin-bottom: 16px; }
  .card-label { font-size: 0.72rem; letter-spacing: 0.15em; color: var(--accent); font-weight: 700; text-transform: uppercase; margin-bottom: 18px; }
  input, select { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-size: 0.95rem; padding: 12px 14px; outline: none; font-family: 'DM Sans', sans-serif; transition: border-color 0.2s; margin-bottom: 12px; }
  input:focus, select:focus { border-color: var(--accent); }
  input::placeholder { color: #3a3850; }
  select option { background: var(--surface2); }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .field label { font-size: 0.78rem; color: var(--muted); font-weight: 500; display: block; margin-bottom: 6px; }
  .field input, .field select { margin-bottom: 0; }
  .btn { width: 100%; padding: 16px; border-radius: 14px; border: none; background: linear-gradient(135deg, #7c3aed, #db2777); color: white; font-size: 1.05rem; font-weight: 700; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: opacity 0.2s; margin-top: 4px; }
  .btn:hover { opacity: 0.9; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .spinner { width: 44px; height: 44px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading { text-align: center; padding: 48px 0; color: var(--muted); }
  .error { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); border-radius: 12px; padding: 16px; color: #f87171; margin-top: 20px; }
  #result { margin-top: 24px; }
  .result-header { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; margin-bottom: 24px; }
  .result-title { font-family: 'Syne', sans-serif; font-size: 1.2rem; font-weight: 700; }
  .badge { background: rgba(167,139,250,0.15); border: 1px solid rgba(167,139,250,0.3); border-radius: 20px; padding: 5px 14px; font-size: 0.8rem; color: var(--accent); font-weight: 600; }
  .section { background: var(--surface2); border: 1px solid var(--border); border-radius: 14px; padding: 22px; margin-bottom: 14px; }
  .section-title { font-size: 0.72rem; letter-spacing: 0.15em; color: var(--accent2); font-weight: 700; text-transform: uppercase; margin-bottom: 14px; }
  .section p { font-size: 0.93rem; line-height: 1.75; color: #ccc8e8; margin-bottom: 8px; }
  .section ul { padding-left: 0; list-style: none; }
  .section li { display: flex; gap: 10px; align-items: flex-start; margin-bottom: 8px; font-size: 0.93rem; line-height: 1.7; color: #ccc8e8; }
  .section li::before { content: ''; min-width: 6px; height: 6px; border-radius: 50%; background: var(--accent2); margin-top: 9px; flex-shrink: 0; }
  .section strong { color: var(--accent); }
  footer { text-align: center; margin-top: 60px; color: var(--muted); font-size: 0.82rem; }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="lang-selector" id="lang-selector"></div>
    <div style="font-size:3rem;margin-bottom:12px">🎹</div>
    <h1>patchistant</h1>
    <p id="subtitle"></p>
  </header>

  <div class="card">
    <div class="card-label" id="label-song"></div>
    <input type="text" id="song" />
    <input type="text" id="part" />
  </div>

  <div class="card">
    <div class="card-label" style="color:var(--accent2)" id="label-keyboard"></div>
    <div class="grid2">
      <div class="field">
        <label id="label-brand"></label>
        <select id="brand">
          <option value="">– – –</option>
          <option>Nord</option>
          <option>Yamaha</option>
          <option>Roland</option>
          <option>Korg</option>
          <option>Kurzweil</option>
          <option>Arturia</option>
          <option>Sequential</option>
          <option>Moog</option>
          <option>Casio</option>
          <option>Altra / Other</option>
        </select>
      </div>
      <div class="field">
        <label id="label-model"></label>
        <input type="text" id="model" placeholder="Es: Stage 2, Montage…" />
      </div>
    </div>
    <div class="field" style="margin-top:4px">
      <label id="label-notes"></label>
      <input type="text" id="notes" />
    </div>
  </div>

  <button class="btn" id="btn" onclick="generate()"></button>

  <div id="loading" class="hidden">
    <div class="loading"><div class="spinner"></div><p id="loading-text"></p></div>
  </div>
  <div id="error" class="hidden error"></div>
  <div id="result" class="hidden"></div>

  <footer>patchistant © 2026 — Powered by Claude AI</footer>
</div>

    flag: '🇫🇷', name: 'FR',

    alertSong: 'Введите название песни.',

    promptLang: 'русский'
  },
  ko: {

    labelSong: '🎵 노래',

    partPlaceholder: '특정 파트: 인트로 신스, 솔로… (선택)',

    btnText: '🚀 패치 생성',
    loadingText: '분석 중…',
    alertBrand: '키보드 브랜드를 선택하세요.',
    alertSong: '노래 제목을 입력하세요.',
    resultFor: '결과',

let currentLang = 'it';

function setLang(code) {
  currentLang = code;
  const L = LANGS[code];
  document.getElementById('subtitle').textContent = L.subtitle;
  document.getElementById('label-song').textContent = L.labelSong;
  document.getElementById('song').placeholder = L.songPlaceholder;
  document.getElementById('part').placeholder = L.partPlaceholder;
  document.getElementById('label-keyboard').textContent = L.labelKeyboard;
  document.getElementById('label-brand').textContent = L.labelBrand;
  document.getElementById('label-model').textContent = L.labelModel;
  document.getElementById('label-notes').textContent = L.labelNotes;
  document.getElementById('notes').placeholder = L.notesPlaceholder;
  document.getElementById('btn').textContent = L.btnText;
  document.getElementById('loading-text').textContent = L.loadingText;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === code));
}

function buildLangSelector() {
  const sel = document.getElementById('lang-selector');
  Object.entries(LANGS).forEach(([code, L]) => {
    const btn = document.createElement('button');
    btn.className = 'lang-btn';
    btn.dataset.lang = code;
    btn.textContent = L.flag + ' ' + L.name;
    btn.onclick = () => setLang(code);
    sel.appendChild(btn);
  });
}

function parseSections(text) {
  const sections = [];
  const parts = text.split(/\n(?=###?\s)/);
  for (const part of parts) {
    const match = part.match(/^###?\s*(.+?)\n([\s\S]*)/);
    if (match) sections.push({ title: match[1].replace(/[🔍🎛️📊💡🎸🎹]/g, '').trim(), content: match[2].trim() });
    else if (part.trim()) sections.push({ title: 'Guide', content: part.trim() });
  }
  return sections.length ? sections : [{ title: 'Patch guide', content: text }];
}

function renderSection(s) {
  const lines = s.content.split('\n').filter(l => l.trim());
  let html = '<div class="section"><div class="section-title">' + s.title + '</div>';
  let inList = false;
  for (const line of lines) {
    const clean = line.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/^[-•*\d.]+\s*/, '').trim();
    if (!clean) continue;
    if (/^[-•*\d]/.test(line.trim())) {
      if (!inList) { html += '<ul>'; inList = true; }
      html += '<li>' + clean + '</li>';
    } else {
      if (inList) { html += '</ul>'; inList = false; }
      html += '<p>' + clean + '</p>';
    }
  }
  if (inList) html += '</ul>';
  html += '</div>';
  return html;
}

async function generate() {
  const L = LANGS[currentLang];
  const brand = document.getElementById('brand').value;
  const model = document.getElementById('model').value.trim();
  const notes = document.getElementById('notes').value.trim();
  const song = document.getElementById('song').value.trim();
  const part = document.getElementById('part').value.trim();

  if (!brand) { alert(L.alertBrand); return; }
  if (!song) { alert(L.alertSong); return; }

  const songInfo = song + (part ? ' — ' + part : '');
  const instrument = brand + (model ? ' ' + model : '');

  document.getElementById('btn').disabled = true;
  document.getElementById('loading').classList.remove('hidden');
  document.getElementById('error').classList.add('hidden');
  document.getElementById('result').classList.add('hidden');

  try {
    const res = await fetch('/api/patch', {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({ songInfo, instrument, notes, type: 'keyboard', lang: L.promptLang })
    });

    if (!res.ok) {
      const e = await res.json().catch(() => ({}));
      throw new Error(e.error || 'Error ' + res.status);
    }

    const data = await res.json();
    if (!data.text) throw new Error('Empty response, please retry.');

    const sections = parseSections(data.text);
    document.getElementById('result').innerHTML =
      '<div class="result-header">' +
        '<div>' +
          '<div style="font-size:0.72rem;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:0.1em">' + L.resultFor + '</div>' +
          '<div class="result-title">🎵 ' + songInfo + '</div>' +
        '</div>' +
        '<div class="badge">🎹 ' + instrument + '</div>' +
      '</div>' +
      sections.map(renderSection).join('');
    document.getElementById('result').classList.remove('hidden');
  } catch(e) {
    document.getElementById('error').textContent = '❌ ' + e.message;
    document.getElementById('error').classList.remove('hidden');
  }

  document.getElementById('btn').disabled = false;
  document.getElementById('loading').classList.add('hidden');
}

buildLangSelector();
setLang('it');
</script>
