<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>patchistant – Il tuo assistente per le patch</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap');
  :root {
    --bg: #0c0c13; --surface: #16161f; --surface2: #1e1e2e;
    --accent: #a78bfa; --accent2: #f472b6; --text: #e2e0f0;
    --muted: #6b6880; --border: #2a2a3a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; padding: 40px 16px; }
  .container { max-width: 720px; margin: 0 auto; }
  header { text-align: center; margin-bottom: 48px; position: relative; }
  header h1 { font-family: 'Syne', sans-serif; font-size: 2.8rem; font-weight: 800; background: linear-gradient(135deg, #a78bfa, #f472b6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  header p { color: var(--muted); margin-top: 10px; font-size: 1rem; }

  /* Language dropdown */
  .lang-wrapper { position: absolute; top: 0; right: 0; }
  .lang-toggle { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-size: 0.85rem; padding: 7px 12px; cursor: pointer; font-family: 'DM Sans', sans-serif; display: flex; align-items: center; gap: 6px; transition: border-color 0.2s; }
  .lang-toggle:hover { border-color: var(--accent); }
  .lang-toggle .arrow { font-size: 0.6rem; color: var(--muted); transition: transform 0.2s; }
  .lang-toggle.open .arrow { transform: rotate(180deg); }
  .lang-menu { display: none; position: absolute; top: calc(100% + 6px); right: 0; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; z-index: 100; min-width: 150px; box-shadow: 0 8px 32px rgba(0,0,0,0.4); max-height: 320px; overflow-y: auto; }
  .lang-menu.open { display: block; }
  .lang-option { display: flex; align-items: center; gap: 10px; padding: 10px 14px; cursor: pointer; font-size: 0.88rem; transition: background 0.15s; }
  .lang-option:hover { background: var(--surface2); }
  .lang-option.active { color: var(--accent); background: rgba(167,139,250,0.08); }

  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 28px; margin-bottom: 16px; }
  .card-label { font-size: 0.72rem; letter-spacing: 0.15em; color: var(--accent); font-weight: 700; text-transform: uppercase; margin-bottom: 18px; }
  input, select { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-size: 0.95rem; padding: 12px 14px; outline: none; font-family: 'DM Sans', sans-serif; transition: border-color 0.2s; margin-bottom: 12px; }
  input:focus, select:focus { border-color: var(--accent); }
  input::placeholder { color: #3a3850; }
  select option { background: var(--surface2); }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .field label { font-size: 0.78rem; color: var(--muted); font-weight: 500; display: block; margin-bottom: 6px; }
  .field input, .field select { margin-bottom: 0; }
  .btn { width: 100%; padding: 16px; border-radius: 14px; border: none; background: linear-gradient(135deg, #7c3aed, #db2777); color: white; font-size: 1.05rem; font-weight: 700; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: opacity 0.2s; margin-top: 4px; }
  .btn:hover { opacity: 0.9; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .spinner { width: 44px; height: 44px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading { text-align: center; padding: 48px 0; color: var(--muted); }
  .error { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); border-radius: 12px; padding: 16px; color: #f87171; margin-top: 20px; }
  #result { margin-top: 24px; }
  .result-header { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; margin-bottom: 24px; }
  .result-title { font-family: 'Syne', sans-serif; font-size: 1.2rem; font-weight: 700; }
  .badge { background: rgba(167,139,250,0.15); border: 1px solid rgba(167,139,250,0.3); border-radius: 20px; padding: 5px 14px; font-size: 0.8rem; color: var(--accent); font-weight: 600; }
  .section { background: var(--surface2); border: 1px solid var(--border); border-radius: 14px; padding: 22px; margin-bottom: 14px; }
  .section-title { font-size: 0.72rem; letter-spacing: 0.15em; color: var(--accent2); font-weight: 700; text-transform: uppercase; margin-bottom: 14px; }
  .section p { font-size: 0.93rem; line-height: 1.75; color: #ccc8e8; margin-bottom: 8px; }
  .section ul { padding-left: 0; list-style: none; }
  .section li { display: flex; gap: 10px; align-items: flex-start; margin-bottom: 8px; font-size: 0.93rem; line-height: 1.7; color: #ccc8e8; }
  .section li::before { content: ''; min-width: 6px; height: 6px; border-radius: 50%; background: var(--accent2); margin-top: 9px; flex-shrink: 0; }
  .section strong { color: var(--accent); }
  footer { text-align: center; margin-top: 60px; color: var(--muted); font-size: 0.82rem; }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="lang-wrapper">
      <button class="lang-toggle" id="lang-toggle" onclick="toggleMenu()">
        <span id="lang-current">🇮🇹 IT</span>
        <span class="arrow">▼</span>
      </button>
      <div class="lang-menu" id="lang-menu"></div>
    </div>
    <div style="font-size:3rem;margin-bottom:12px">🎹</div>
    <h1>patchistant</h1>
    <p id="subtitle"></p>
  </header>

  <div class="card">
    <div class="card-label" id="label-song"></div>
    <input type="text" id="song" />
    <input type="text" id="part" />
  </div>

  <div class="card">
    <div class="card-label" style="color:var(--accent2)" id="label-keyboard"></div>
    <div class="grid2">
      <div class="field">
        <label id="label-brand"></label>
        <select id="brand">
          <option value="">– – –</option>
          <option>Nord</option>
          <option>Yamaha</option>
          <option>Roland</option>
          <option>Korg</option>
          <option>Kurzweil</option>
          <option>Arturia</option>
          <option>Sequential</option>
          <option>Moog</option>
          <option>Casio</option>
          <option>Altra / Other</option>
        </select>
      </div>
      <div class="field">
        <label id="label-model"></label>
        <input type="text" id="model" placeholder="Es: Stage 2, Montage…" />
      </div>
    </div>
    <div class="field" style="margin-top:4px">
      <label id="label-notes"></label>
      <input type="text" id="notes" />
    </div>
  </div>

  <button class="btn" id="btn" onclick="generate()"></button>

  <div id="loading" class="hidden" style="display:none">
    <div class="loading"><div class="spinner"></div><p id="loading-text"></p></div>
  </div>
  <div id="error" style="display:none" class="error"></div>
  <div id="result" style="display:none"></div>

  <footer>patchistant © 2026 — Powered by Claude AI</footer>
</div>

<script>
const LANGS = {
  it: { flag: '🇮🇹', name: 'Italiano', subtitle: 'get inspired to recreate your favorite sounds', labelSong: '🎵 Canzone', songPlaceholder: 'Es: The Final Countdown – Europe', partPlaceholder: 'Parte specifica: intro synth, solo… (opzionale)', labelKeyboard: '🎛️ La tua tastiera', labelBrand: 'Brand', labelModel: 'Modello', labelNotes: 'Note aggiuntive (opzionale)', notesPlaceholder: 'Es: solo synth engine, no samples…', btnText: '🚀 Genera la Patch', loadingText: 'Analisi in corso…', alertBrand: 'Seleziona la marca della tastiera.', alertSong: 'Inserisci il titolo della canzone.', resultFor: 'Risultato per', promptLang: 'italiano' },
  en: { flag: '🇬🇧', name: 'English', subtitle: 'get inspired to recreate your favorite sounds', labelSong: '🎵 Song', songPlaceholder: 'E.g.: The Final Countdown – Europe', partPlaceholder: 'Specific part: intro synth, solo… (optional)', labelKeyboard: '🎛️ Your keyboard', labelBrand: 'Brand', labelModel: 'Model', labelNotes: 'Additional notes (optional)', notesPlaceholder: 'E.g.: synth engine only…', btnText: '🚀 Generate Patch', loadingText: 'Analysing…', alertBrand: 'Please select your keyboard brand.', alertSong: 'Please enter the song title.', resultFor: 'Result for', promptLang: 'English' },
  es: { flag: '🇪🇸', name: 'Español', subtitle: 'get inspired to recreate your favorite sounds', labelSong: '🎵 Canción', songPlaceholder: 'Ej: The Final Countdown – Europe', partPlaceholder: 'Parte específica: sintetizador intro… (opcional)', labelKeyboard: '🎛️ Tu teclado', labelBrand: 'Brand', labelModel: 'Modelo', labelNotes: 'Notas adicionales (opcional)', notesPlaceholder: 'Ej: solo motor synth…', btnText: '🚀 Generar Patch', loadingText: 'Analizando…', alertBrand: 'Selecciona la marca.', alertSong: 'Introduce el título.', resultFor: 'Resultado para', promptLang: 'español' },
  fr: { flag: '🇫🇷', name: 'Français', subtitle: "Reproduisez n'importe quel son sur n'importe quel clavier", labelSong: '🎵 Chanson', songPlaceholder: 'Ex: The Final Countdown – Europe', partPlaceholder: 'Partie spécifique: intro synth… (optionnel)', labelKeyboard: '🎛️ Votre clavier', labelBrand: 'Brand', labelModel: 'Modèle', labelNotes: 'Notes supplémentaires (optionnel)', notesPlaceholder: 'Ex: moteur synth uniquement…', btnText: '🚀 Générer le Patch', loadingText: 'Analyse en cours…', alertBrand: 'Sélectionnez la marque.', alertSong: 'Entrez le titre.', resultFor: 'Résultat pour', promptLang: 'français' },
  de: { flag: '🇩🇪', name: 'Deutsch', subtitle: 'get inspired to recreate your favorite sounds', labelSong: '🎵 Song', songPlaceholder: 'Z.B.: The Final Countdown – Europe', partPlaceholder: 'Bestimmter Teil: Intro-Synth… (optional)', labelKeyboard: '🎛️ Dein Keyboard', labelBrand: 'Brand', labelModel: 'Modell', labelNotes: 'Zusätzliche Notizen (optional)', notesPlaceholder: 'Z.B.: nur Synth-Engine…', btnText: '🚀 Patch generieren', loadingText: 'Analyse läuft…', alertBrand: 'Bitte wähle eine Marke.', alertSong: 'Bitte gib den Songtitel ein.', resultFor: 'Ergebnis für', promptLang: 'Deutsch' },
  pt: { flag: '🇧🇷', name: 'Português', subtitle: 'get inspired to recreate your favorite sounds', labelSong: '🎵 Música', songPlaceholder: 'Ex: The Final Countdown – Europe', partPlaceholder: 'Parte específica: intro synth… (opcional)', labelKeyboard: '🎛️ Seu teclado', labelBrand: 'Brand', labelModel: 'Modelo', labelNotes: 'Notas adicionais (opcional)', notesPlaceholder: 'Ex: apenas motor synth…', btnText: '🚀 Gerar Patch', loadingText: 'Analisando…', alertBrand: 'Selecione a marca.', alertSong: 'Digite o título.', resultFor: 'Resultado para', promptLang: 'português' },
  ja: { flag: '🇯🇵', name: '日本語', subtitle: 'get inspired to recreate your favorite sounds', labelSong: '🎵 楽曲', songPlaceholder: '例: The Final Countdown – Europe', partPlaceholder: '特定のパート (任意)', labelKeyboard: '🎛️ キーボード', labelBrand: 'Brand', labelModel: 'モデル', labelNotes: '追加メモ (任意)', notesPlaceholder: '例: シンセエンジンのみ…', btnText: '🚀 パッチを生成', loadingText: '分析中…', alertBrand: 'ブランドを選択してください。', alertSong: '曲名を入力してください。', resultFor: '結果', promptLang: '日本語' },
  zh: { flag: '🇨🇳', name: '中文', subtitle: 'get inspired to recreate your favorite sounds', labelSong: '🎵 歌曲', songPlaceholder: '例如: The Final Countdown – Europe', partPlaceholder: '具体部分 (可选)', labelKeyboard: '🎛️ 您的键盘', labelBrand: 'Brand', labelModel: '型号', labelNotes: '附加说明 (可选)', notesPlaceholder: '例如: 仅合成器引擎…', btnText: '🚀 生成音色', loadingText: '分析中…', alertBrand: '请选择品牌。', alertSong: '请输入歌曲名称。', resultFor: '结果', promptLang: '中文' },
  ru: { flag: '🇷🇺', name: 'Русский', subtitle: 'get inspired to recreate your favorite sounds', labelSong: '🎵 Песня', songPlaceholder: 'Напр.: The Final Countdown – Europe', partPlaceholder: 'Конкретная часть (необязательно)', labelKeyboard: '🎛️ Ваш синтезатор', labelBrand: 'Brand', labelModel: 'Модель', labelNotes: 'Заметки (необязательно)', notesPlaceholder: 'Напр.: только синт-движок…', btnText: '🚀 Создать патч', loadingText: 'Анализ…', alertBrand: 'Выберите бренд.', alertSong: 'Введите название песни.', resultFor: 'Результат для', promptLang: 'русский' },
  ko: { flag: '🇰🇷', name: '한국어', subtitle: 'get inspired to recreate your favorite sounds', labelSong: '🎵 노래', songPlaceholder: '예: The Final Countdown – Europe', partPlaceholder: '특정 파트 (선택)', labelKeyboard: '🎛️ 키보드', labelBrand: 'Brand', labelModel: '모델', labelNotes: '추가 메모 (선택)', notesPlaceholder: '예: 신스 엔진만…', btnText: '🚀 패치 생성', loadingText: '분석 중…', alertBrand: '브랜드를 선택하세요.', alertSong: '노래 제목을 입력하세요.', resultFor: '결과', promptLang: '한국어' }
};

let currentLang = 'it';
let menuOpen = false;

function toggleMenu() {
  menuOpen = !menuOpen;
  document.getElementById('lang-menu').classList.toggle('open', menuOpen);
  document.getElementById('lang-toggle').classList.toggle('open', menuOpen);
}

function selectLang(code) {
  currentLang = code;
  menuOpen = false;
  document.getElementById('lang-menu').classList.remove('open');
  document.getElementById('lang-toggle').classList.remove('open');
  applyLang(code);
}

function applyLang(code) {
  const L = LANGS[code];
  document.getElementById('lang-current').textContent = L.flag + ' ' + L.name.substring(0,2).toUpperCase();
  document.getElementById('subtitle').textContent = L.subtitle;
  document.getElementById('label-song').textContent = L.labelSong;
  document.getElementById('song').placeholder = L.songPlaceholder;
  document.getElementById('part').placeholder = L.partPlaceholder;
  document.getElementById('label-keyboard').textContent = L.labelKeyboard;
  document.getElementById('label-brand').textContent = L.labelBrand;
  document.getElementById('label-model').textContent = L.labelModel;
  document.getElementById('label-notes').textContent = L.labelNotes;
  document.getElementById('notes').placeholder = L.notesPlaceholder;
  document.getElementById('btn').textContent = L.btnText;
  document.getElementById('loading-text').textContent = L.loadingText;
  document.querySelectorAll('.lang-option').forEach(o => o.classList.toggle('active', o.dataset.lang === code));
}

function buildMenu() {
  const menu = document.getElementById('lang-menu');
  Object.entries(LANGS).forEach(([code, L]) => {
    const div = document.createElement('div');
    div.className = 'lang-option';
    div.dataset.lang = code;
    div.innerHTML = '<span>' + L.flag + '</span><span>' + L.name + '</span>';
    div.onclick = () => selectLang(code);
    menu.appendChild(div);
  });
}

document.addEventListener('click', e => {
  if (menuOpen && !document.querySelector('.lang-wrapper').contains(e.target)) {
    menuOpen = false;
    document.getElementById('lang-menu').classList.remove('open');
    document.getElementById('lang-toggle').classList.remove('open');
  }
});

function show(id) { document.getElementById(id).style.display = ''; }
function hide(id) { document.getElementById(id).style.display = 'none'; }

function parseSections(text) {
  const sections = [];
  const parts = text.split(/\n(?=###?\s)/);
  for (const part of parts) {
    const match = part.match(/^###?\s*(.+?)\n([\s\S]*)/);
    if (match) sections.push({ title: match[1].replace(/[🔍🎛️📊💡🎸🎹]/g, '').trim(), content: match[2].trim() });
    else if (part.trim()) sections.push({ title: 'Guide', content: part.trim() });
  }
  return sections.length ? sections : [{ title: 'Patch guide', content: text }];
}

function renderSection(s) {
  const lines = s.content.split('\n').filter(l => l.trim());
  let html = '<div class="section"><div class="section-title">' + s.title + '</div>';
  let inList = false;
  for (const line of lines) {
    const clean = line.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/^[-•*\d.]+\s*/, '').trim();
    if (!clean) continue;
    if (/^[-•*\d]/.test(line.trim())) {
      if (!inList) { html += '<ul>'; inList = true; }
      html += '<li>' + clean + '</li>';
    } else {
      if (inList) { html += '</ul>'; inList = false; }
      html += '<p>' + clean + '</p>';
    }
  }
  if (inList) html += '</ul>';
  html += '</div>';
  return html;
}

async function generate() {
  const L = LANGS[currentLang];
  const brand = document.getElementById('brand').value;
  const model = document.getElementById('model').value.trim();
  const notes = document.getElementById('notes').value.trim();
  const song = document.getElementById('song').value.trim();
  const part = document.getElementById('part').value.trim();

  if (!brand) { alert(L.alertBrand); return; }
  if (!song) { alert(L.alertSong); return; }

  const songInfo = song + (part ? ' — ' + part : '');
  const instrument = brand + (model ? ' ' + model : '');

  document.getElementById('btn').disabled = true;
  show('loading'); hide('error'); hide('result');

  try {
    const res = await fetch('/api/patch', {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({ songInfo, instrument, notes, type: 'keyboard', lang: L.promptLang })
    });

    if (!res.ok) {
      const e = await res.json().catch(() => ({}));
      throw new Error(e.error || 'Error ' + res.status);
    }

    const data = await res.json();
    if (!data.text) throw new Error('Empty response');

    const sections = parseSections(data.text);
    document.getElementById('result').innerHTML =
      '<div class="result-header">' +
        '<div><div style="font-size:0.72rem;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:0.1em">' + L.resultFor + '</div>' +
        '<div class="result-title">🎵 ' + songInfo + '</div></div>' +
        '<div class="badge">🎹 ' + instrument + '</div>' +
      '</div>' +
      sections.map(renderSection).join('');
    show('result');
  } catch(e) {
    document.getElementById('error').textContent = '❌ ' + e.message;
    show('error');
  }

  document.getElementById('btn').disabled = false;
  hide('loading');
}

buildMenu();
applyLang('it');
</script>
</body>
</html>
